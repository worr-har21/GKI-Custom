name: Android15-6.6-Custom

on: 
  workflow_dispatch:
    inputs:
      os_patch_level:
        required: true
        type: string
        description: >
          Patch level (z. B. 2024-11 für GKI ZIP)
          for example: 2024-11
      os_version:
        required: true
        type: string
        description: >
          OS Version of boot image
          for example: 15.0.0
      version_name:
        required: true
        type: string
        description: >
          Name für Artifacts (vermeide \, /, :, ", <, >, |, *, ?)
          for example: android15-6.6-docker
      custom:
        required: true
        type: boolean
        description: >
          Enable LXC, Docker (via rvalyi Patches)
      kernelsu:
        required: true
        type: boolean
        description: >
          Enable KernelSU

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt install repo wget unzip -y

    - name: Install latest repo tool
      run: |
        curl https://storage.googleapis.com/git-repo-downloads/repo > /usr/local/bin/repo
        chmod a+x /usr/local/bin/repo

    - name: Verify repo version
      run: repo --version

    - name: Sync the kernel source code
      run: |
        cd $GITHUB_WORKSPACE
        mkdir android-kernel
        cd android-kernel
        repo init --depth 1 -u https://android.googlesource.com/kernel/manifest -b common-android15-6.6
        repo sync -j$(nproc)

    - name: Apply patches and configuration files
      if: ${{ inputs.custom == true }}
      run: |
        cd $GITHUB_WORKSPACE
        git clone https://github.com/rvalyi/GKI-Custom.git gki-patch
        
        if [ -f ./gki-patch/config/gki_defconfig-android15-6.6 ]; then
          cp ./gki-patch/config/gki_defconfig-android15-6.6 ./android-kernel/common/arch/arm64/configs/gki_defconfig
        else
          echo "Keine exakte Defconfig für 6.6 gefunden – nutze Standard gki_defconfig"
        fi
        
        cd ./android-kernel/common
        git apply $GITHUB_WORKSPACE/gki-patch/patchs/*.patch || echo "Warnung: Einige Patches konnten nicht angewendet werden"

    - name: KernelSU
      if: ${{ inputs.kernelsu == true }}
      run: |
        cd $GITHUB_WORKSPACE/android-kernel
        curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -

    - name: Build Kernel
      run: |
        cd $GITHUB_WORKSPACE/android-kernel
        mkdir -p out/android15-6.6/dist
        tools/bazel run //common:kernel_aarch64_dist -- --dist_dir=out/android15-6.6/dist

    - name: Sanitize Artifact Name
      run: |
        SAFE_NAME=\( (echo " \){{ inputs.version_name }}" | sed -e 's/[\\/:"<>|*?]/-/g')
        echo "SAFE_ARTIFACT_NAME=Kernel-\( SAFE_NAME- \){{ inputs.os_patch_level }}" >> $GITHUB_ENV

    - name: Prepare artifacts
      run: |
        cd $GITHUB_WORKSPACE
        OUTDIR=android-kernel/out/android15-6.6/dist
        mkdir -p output
        cp $OUTDIR/Image ./output/ || echo "Image nicht gefunden"
        cp $OUTDIR/Image.lz4 ./output/ || echo "Image.lz4 nicht gefunden"
        cp $OUTDIR/Image ./
        gzip -n -k -f -9 Image > Image.gz
        
        git clone https://github.com/Kernel-SU/AnyKernel3
        rm -rf ./AnyKernel3/.git
        cp $OUTDIR/Image ./AnyKernel3/
        
        wget https://dl.google.com/android/gki/gki-certified-boot-android15-6.6-${{ inputs.os_patch_level }}_r1.zip -O gki-kernel.zip || echo "GKI ZIP nicht verfügbar"
        if [ -f gki-kernel.zip ]; then
          unzip -q gki-kernel.zip
          rm gki-kernel.zip
        fi
        
        cd $GITHUB_WORKSPACE/android-kernel
        if ls $GITHUB_WORKSPACE/boot*.img 1> /dev/null 2>&1; then
          ./tools/mkbootimg/unpack_bootimg.py --boot_img $GITHUB_WORKSPACE/boot*.img
        else
          echo "Keine originale boot.img gefunden – boot.img-Bau übersprungen"
        fi
        
        if [ -d out/ramdisk ]; then
          ./tools/mkbootimg/mkbootimg.py --header_version 4 --kernel \( OUTDIR/Image --ramdisk out/ramdisk --os_version \){{ inputs.os_version }} --os_patch_level ${{ inputs.os_patch_level }} -o \( GITHUB_WORKSPACE/output/ \){{ inputs.version_name }}-boot.img
          ./tools/mkbootimg/mkbootimg.py --header_version 4 --kernel \( OUTDIR/Image.lz4 --ramdisk out/ramdisk --os_version \){{ inputs.os_version }} --os_patch_level ${{ inputs.os_patch_level }} -o \( GITHUB_WORKSPACE/output/ \){{ inputs.version_name }}-boot-lz4.img
          ./tools/mkbootimg/mkbootimg.py --header_version 4 --kernel \( GITHUB_WORKSPACE/Image.gz --ramdisk out/ramdisk --os_version \){{ inputs.os_version }} --os_patch_level ${{ inputs.os_patch_level }} -o \( GITHUB_WORKSPACE/output/ \){{ inputs.version_name }}-boot-gz.img
        fi

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.SAFE_ARTIFACT_NAME }}
        path: |
          ./output/*
          ./AnyKernel3/*

    - name: Upload AnyKernel3 separately (falls nötig)
      uses: actions/upload-artifact@v4
      with:
        name: AnyKernel3-${{ env.SAFE_ARTIFACT_NAME }}
        path: ./AnyKernel3/*
